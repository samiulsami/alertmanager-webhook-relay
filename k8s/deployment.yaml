apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-webhook-relay
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager-webhook-relay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager-webhook-relay
    spec:
      containers:
      - name: alertmanager-webhook-relay
        image: ${DOCKER_REGISTRY}/${IMAGE_NAME}:${VERSION}
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: LISTEN_ADDR
          value: "${LISTEN_ADDR}"
        - name: REQUEST_TIMEOUT
          value: "${REQUEST_TIMEOUT}"
        - name: SEND_RESOLVED
          value: "${SEND_RESOLVED}"
        - name: WEBHOOK_URLS_FILE
          value: /etc/alertmanager-webhook-relay/webhooks/urls
        - name: DEDUPE_CACHE_SIZE
          value: "10000"
        - name: MAX_REQUEST_BODY_BYTES
          value: "1048576"
        volumeMounts:
        - name: webhook-urls
          mountPath: /etc/alertmanager-webhook-relay/webhooks
          readOnly: true
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
      volumes:
      - name: webhook-urls
        secret:
          secretName: ${WEBHOOK_URLS_SECRET_NAME}
          items:
          - key: urls
            path: urls
